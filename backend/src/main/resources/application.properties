spring.application.name=backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:devmock_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Para empezar rápido: crea/actualiza tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

# Buenas prácticas
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logs SQL (opcional)
spring.jpa.show-sql=true

# JWT
jwt.secret=clave-super-secreta-de-al-menos-32-caracteres-devmock
jwt.expiration-ms=86400000
# CORS
spring.web.cors.allowed-origins=http://localhost:5173

